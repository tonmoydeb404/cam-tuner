name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@cam-tuner/extension...

      - name: Lint
        run: pnpm turbo lint --filter=@cam-tuner/extension...

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Test
        run: pnpm turbo test --filter=@cam-tuner/extension...

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      VITE_WEB_URL: ${{ vars.VITE_WEB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependency packages
        run: pnpm turbo build --filter=@cam-tuner/extension^...

      - name: Zip Chrome extension
        run: pnpm --filter @cam-tuner/extension zip

      - name: Zip Firefox extension
        run: pnpm --filter @cam-tuner/extension zip:firefox

      - name: Upload ZIPs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            apps/extension/.output/cam-tuner-*-chrome.zip
            apps/extension/.output/cam-tuner-*-firefox.zip
            apps/extension/.output/cam-tuner-*-sources.zip
